name: CI

on:
  push:
    branches: [dev, main] # dev = snapshot verification; main = formal (post-merge)
  pull_request:
    branches: [main] # gate the dev -> main PR

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go (fmt · vet · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod verify
        run: go mod verify

      - name: build
        run: go build ./...

      # Unit tests only (httptest / offline); no live business calls.
      - name: test
        run: go test -race ./...
